# Application Config
spring.application.name=CodeChecker
server.port=8081

# ── PostgreSQL Database ──────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/codechecker
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=postgres

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# File upload limits
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# ── JWT Configuration ────────────────────────────────────────────────
app.jwt.secret=YourSuperSecretKeyForJWTTokenSigning_PleaseChangeInProduction_MinLength256Bits!!
app.jwt.expiration-ms=900000
app.jwt.refresh-expiration-ms=604800000

# ── Google OAuth2 ────────────────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# ── Frontend URL (for CORS + OAuth redirect) ─────────────────────────
app.frontend.url=http://localhost:5173

# ── Mail Configuration ───────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.jpa.open-in-view=false
